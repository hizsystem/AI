<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', sans-serif;
    background: linear-gradient(180deg, #0D0820 0%, #1A1040 100%);
    color: #FFFFFF;
}
.slide { width: 1080px; height: 1080px; position: relative; overflow: hidden; }

.logo {
    position: absolute; top: 40px; right: 48px;
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 1px;
    z-index: 10;
}

/* 배경 네트워크 효과 */
.network-bg {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    opacity: 0.15;
}
.network-bg .ring {
    position: absolute; border-radius: 50%;
    border: 1px solid #A855F7;
}
.network-bg .ring-1 { width: 200px; height: 200px; top: 200px; left: 200px; }
.network-bg .ring-2 { width: 350px; height: 350px; top: 125px; left: 125px; }
.network-bg .ring-3 { width: 500px; height: 500px; top: 50px; left: 50px; }
.network-bg .ring-4 { width: 600px; height: 600px; top: 0px; left: 0px; }

.network-bg .dot {
    position: absolute; width: 8px; height: 8px;
    background: #A855F7; border-radius: 50%;
}
.network-bg .dot-1 { top: 200px; left: 300px; }
.network-bg .dot-2 { top: 125px; left: 400px; }
.network-bg .dot-3 { top: 350px; left: 125px; }
.network-bg .dot-4 { top: 420px; left: 450px; }
.network-bg .dot-5 { top: 100px; left: 200px; }
.network-bg .dot-6 { top: 500px; left: 300px; }
.network-bg .dot-7 { top: 300px; left: 500px; }
.network-bg .dot-8 { top: 150px; left: 150px; }

.content {
    position: relative; z-index: 5;
    padding: 72px 64px; padding-bottom: 120px;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%;
}

.tag {
    display: inline-block;
    font-size: 20px; font-weight: 600;
    color: #A855F7; background: rgba(168,85,247,0.12);
    padding: 8px 20px; border-radius: 100px;
    margin-bottom: 28px; width: fit-content;
}

.headline {
    font-size: 54px; font-weight: 800; line-height: 1.3;
    letter-spacing: -1.5px; margin-bottom: 16px;
}
.headline .purple { color: #A855F7; font-size: 72px; }

.sub-headline {
    font-size: 42px; font-weight: 800; line-height: 1.3;
    margin-bottom: 48px;
}

/* 숫자 카드 */
.stats-row {
    display: flex; gap: 20px; margin-bottom: 40px;
}
.stat-card {
    flex: 1;
    background: rgba(168,85,247,0.08);
    border: 1px solid rgba(168,85,247,0.2);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
}
.stat-card .number {
    font-size: 36px; font-weight: 800; color: #A855F7;
    margin-bottom: 8px;
}
.stat-card .label {
    font-size: 18px; color: #94A3B8;
}

.case-info {
    font-size: 20px; color: #6B7280; text-align: center; margin-bottom: 32px;
}

.bottom-text {
    text-align: center;
}
.bottom-text .line1 {
    font-size: 30px; font-weight: 700; color: #E2E8F0;
    margin-bottom: 8px;
}
.bottom-text .line2 {
    font-size: 24px; font-weight: 400; color: #94A3B8;
}
.bottom-text .line2 .purple { color: #A855F7; font-weight: 600; }

.cta-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 88px; background: #7C3AED;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; color: #FFFFFF;
}
