<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', sans-serif;
    background: #0A0A0A;
    color: #FFFFFF;
}
.slide { width: 1080px; height: 1080px; position: relative; }

.logo {
    position: absolute; top: 40px; right: 48px;
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 1px;
}

.content {
    padding: 72px 64px; padding-bottom: 120px;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%;
}

.tag {
    display: inline-block;
    font-size: 20px; font-weight: 600;
    color: #FF6B35; background: rgba(255,107,53,0.12);
    padding: 8px 20px; border-radius: 100px;
    margin-bottom: 28px; width: fit-content;
}

.hook {
    font-size: 28px; font-weight: 400; color: #94A3B8;
    line-height: 1.5; margin-bottom: 20px;
}

.headline {
    font-size: 50px; font-weight: 800; line-height: 1.3;
    letter-spacing: -1.5px; margin-bottom: 48px;
}
.headline .orange { color: #FF6B35; }

/* 차트 영역 */
.chart-area {
    position: relative;
    height: 240px;
    margin-bottom: 40px;
    background: linear-gradient(180deg, rgba(255,107,53,0.05) 0%, transparent 100%);
    border-radius: 16px;
    border: 1px solid rgba(255,107,53,0.1);
    padding: 24px 32px;
    display: flex; align-items: flex-end; justify-content: space-around;
}

.bar-group {
    text-align: center;
    display: flex; flex-direction: column; align-items: center;
}
.bar {
    width: 100px; border-radius: 8px 8px 0 0;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 12px; font-weight: 800; font-size: 20px;
}
.bar.before {
    height: 80px; background: #374151; color: #9CA3AF;
}
.bar.after-1 {
    height: 170px;
    background: linear-gradient(180deg, #FF6B35 0%, #CC4420 100%);
    color: #FFFFFF;
}
.bar.after-2 {
    height: 200px;
    background: linear-gradient(180deg, #FF8C5A 0%, #FF6B35 100%);
    color: #FFFFFF;
}
.bar-label {
    font-size: 18px; color: #94A3B8; margin-top: 12px; font-weight: 500;
}

.case-info {
    font-size: 20px; color: #6B7280; text-align: center; margin-bottom: 32px;
}

.bottom-text {
    text-align: center;
}
.bottom-text .line1 {
    font-size: 28px; font-weight: 700; color: #E2E8F0;
    margin-bottom: 8px;
}
.bottom-text .line2 {
    font-size: 24px; font-weight: 400; color: #94A3B8;
}
.bottom-text .line2 .orange { color: #FF6B35; font-weight: 600; }

.cta-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 88px; background: #FF6B35;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; color: #FFFFFF;
}
</style>
</head>
<body>
<div class="slide">
    <div class="logo">brandrise</div>
    <div class="content">
        <div class="tag">퍼포먼스 마케팅</div>
        <div class="headline">
            광고비만 태우고 계신가요?<br>
            인터랙션 <span class="orange">215%</span>, 이렇게 만듭니다.
        </div>

        <div class="chart-area">
            <div class="bar-group">
                <div class="bar before">기존</div>
                <div class="bar-label">Before</div>
            </div>
            <div class="bar-group">
                <div class="bar after-1">+113%</div>
                <div class="bar-label">노출</div>
            </div>
            <div class="bar-group">
                <div class="bar after-2">+215%</div>
                <div class="bar-label">인터랙션</div>
            </div>
        </div>

        <div class="case-info">Client: 하이네켄 / 현대포인트</div>

        <div class="bottom-text">
            <div class="line1">퍼포먼스 마케팅은 소재가 80%입니다.</div>
            <div class="line2"><span class="orange">크리에이티브</span>가 ROAS를 만듭니다.</div>
        </div>
    </div>
    <div class="cta-bar">우리 광고 무료 진단받기 →</div>
</div>
</body>
</html>
