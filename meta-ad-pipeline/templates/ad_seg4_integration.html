<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', sans-serif;
    background: #0A0A0A;
    color: #FFFFFF;
}
.slide { width: 1080px; height: 1080px; position: relative; }

.logo {
    position: absolute; top: 40px; right: 48px;
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 1px;
    z-index: 10;
}

.content {
    padding: 52px 64px;
    padding-bottom: 96px;
    display: flex; flex-direction: column;
    height: 100%;
}

.tag {
    display: inline-block;
    font-size: 18px; font-weight: 600;
    color: #60A5FA; background: rgba(255,255,255,0.08);
    padding: 8px 20px; border-radius: 100px;
    margin-bottom: 32px; width: fit-content;
}

/* 메인 영역 - 상단 헤드라인 */
.main-area {
    margin-bottom: 36px;
}

.headline {
    font-size: 52px; font-weight: 900; line-height: 1.25;
    letter-spacing: -2px;
    color: #FFFFFF;
    margin-bottom: 12px;
}

.highlight-sub {
    font-size: 42px; font-weight: 800; line-height: 1.3;
    color: #E8752E;
    letter-spacing: -1.5px;
}

/* 비교 영역 */
.comparison {
    display: flex; gap: 20px;
    margin-bottom: 32px;
    flex: 1;
    align-items: stretch;
}

.compare-card {
    flex: 1;
    border-radius: 16px;
    padding: 32px 28px;
    display: flex; flex-direction: column;
}

.compare-card.current {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
}

.compare-card.brandrise {
    background: rgba(232,117,46,0.15);
    border: 2px solid #E8752E;
}

.compare-label {
    font-size: 16px; font-weight: 600;
    margin-bottom: 24px;
    letter-spacing: 0.5px;
}

.compare-card.current .compare-label {
    color: #6B7280;
}

.compare-card.brandrise .compare-label {
    color: #E8752E;
}

.compare-items {
    display: flex; flex-direction: column;
    gap: 18px;
    flex: 1;
    justify-content: center;
}

.compare-item {
    display: flex; align-items: center; gap: 14px;
    font-size: 22px; font-weight: 600; line-height: 1.4;
}

.compare-card.current .compare-item {
    color: #6B7280;
}

.compare-card.brandrise .compare-item {
    color: #FFFFFF;
}

.compare-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
}

.compare-card.current .compare-icon {
    background: rgba(255,255,255,0.06);
    color: #4B5563;
}

.compare-card.brandrise .compare-icon {
    background: rgba(232,117,46,0.3);
    color: #E8752E;
}

/* 서브카피 */
.sub-copy {
    font-size: 24px; font-weight: 500; color: #94A3B8;
    line-height: 1.5;
    text-align: center;
    margin-bottom: 12px;
}

/* CTA 바 */
.cta-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 80px;
    background: #E8752E;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700; color: #FFFFFF;
    letter-spacing: -0.5px;
}
</style>
</head>
<body>
<div class="slide">
    <div class="logo">brandrise</div>

    <div class="content">
        <div class="tag">매출 30-100억 마케팅</div>

        <div class="main-area">
            <div class="headline">대행사 3곳 → 1팀.</div>
            <div class="highlight-sub">비용 30% 절감, 성과 2배.</div>
        </div>

        <div class="comparison">
            <div class="compare-card current">
                <div class="compare-label">현재</div>
                <div class="compare-items">
                    <div class="compare-item">
                        <div class="compare-icon">✕</div>
                        <span>대행사 4곳 분리</span>
                    </div>
                    <div class="compare-item">
                        <div class="compare-icon">✕</div>
                        <span>월 1,600만원+</span>
                    </div>
                    <div class="compare-item">
                        <div class="compare-icon">✕</div>
                        <span>전략 부재</span>
                    </div>
                </div>
            </div>

            <div class="compare-card brandrise">
                <div class="compare-label">brandrise</div>
                <div class="compare-items">
                    <div class="compare-item">
                        <div class="compare-icon">✓</div>
                        <span>1팀 통합</span>
                    </div>
                    <div class="compare-item">
                        <div class="compare-icon">✓</div>
                        <span>합리적 고정비</span>
                    </div>
                    <div class="compare-item">
                        <div class="compare-icon">✓</div>
                        <span>전략→실행 원스톱</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="sub-copy">전략부터 실행까지 한 팀으로 통합합니다.</div>
    </div>

    <div class="cta-bar">30분 전략 상담 예약 →</div>
</div>
</body>
</html>
