<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', sans-serif;
    background: linear-gradient(180deg, #0F172A 0%, #070B14 100%);
    color: #FFFFFF;
}
.slide { width: 1080px; height: 1080px; position: relative; }

.logo {
    position: absolute; top: 40px; right: 48px;
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 1px;
    z-index: 10;
}

.content {
    padding: 52px 64px;
    padding-bottom: 96px;
    display: flex; flex-direction: column;
    height: 100%;
}

.tag {
    display: inline-block;
    font-size: 18px; font-weight: 600;
    color: #60A5FA; background: rgba(96,165,250,0.10);
    padding: 8px 20px; border-radius: 100px;
    margin-bottom: 24px; width: fit-content;
}

.headline {
    font-size: 46px; font-weight: 900; line-height: 1.25;
    letter-spacing: -2px;
    margin-bottom: 16px;
}
.headline .blue {
    color: #60A5FA;
}

.sub-copy {
    font-size: 24px; font-weight: 400; color: #94A3B8;
    line-height: 1.5;
    margin-bottom: 40px;
}
.sub-copy strong {
    color: #60A5FA; font-weight: 700;
}

/* 체크리스트 카드 */
.checklist {
    display: flex; flex-direction: column;
    gap: 16px;
    flex: 1;
    justify-content: center;
}

.check-item {
    display: flex; align-items: center; gap: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 24px 28px;
    transition: all 0.2s;
}
.check-item.active {
    border-color: rgba(96,165,250,0.3);
    background: rgba(96,165,250,0.06);
}

.check-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700;
    flex-shrink: 0;
}
.check-icon.empty {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.15);
    color: #6B7280;
}
.check-icon.filled {
    background: #2563EB;
    color: #FFFFFF;
}

.check-text {
    flex: 1;
}
.check-title {
    font-size: 22px; font-weight: 700; color: #FFFFFF;
    margin-bottom: 4px;
}
.check-desc {
    font-size: 16px; font-weight: 400; color: #6B7280;
}

.check-badge {
    font-size: 14px; font-weight: 700;
    padding: 6px 14px; border-radius: 100px;
    flex-shrink: 0;
}
.check-badge.blue {
    background: rgba(96,165,250,0.15); color: #60A5FA;
}
.check-badge.gray {
    background: rgba(255,255,255,0.05); color: #6B7280;
}

/* 하단 메시지 */
.bottom-msg {
    text-align: center;
    font-size: 18px; font-weight: 500; color: #4B5563;
    margin-top: 20px;
}
.bottom-msg strong {
    color: #60A5FA;
}

/* CTA 바 */
.cta-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(90deg, #2563EB 0%, #3B82F6 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700; color: #FFFFFF;
    letter-spacing: -0.5px;
}
</style>
</head>
<body>
<div class="slide">
    <div class="logo">brandrise</div>

    <div class="content">
        <div class="tag">청창사 졸업 대표님을 위한</div>

        <div class="headline">
            마케팅 예산은 있는데<br><span class="blue">뭘 해야 할지</span> 모르겠다면
        </div>

        <div class="sub-copy">
            사업화 자금 <strong>평균 7천만 원</strong>, 어디에 써야 매출이 될까요?
        </div>

        <div class="checklist">
            <div class="check-item active">
                <div class="check-icon filled">1</div>
                <div class="check-text">
                    <div class="check-title">브랜드 전략 수립</div>
                    <div class="check-desc">포지셔닝 · 메시징 · 비주얼 아이덴티티</div>
                </div>
                <div class="check-badge blue">필수</div>
            </div>
            <div class="check-item active">
                <div class="check-icon filled">2</div>
                <div class="check-text">
                    <div class="check-title">SNS 콘텐츠 운영</div>
                    <div class="check-desc">인스타그램 · 블로그 · 콘텐츠 시스템</div>
                </div>
                <div class="check-badge blue">필수</div>
            </div>
            <div class="check-item">
                <div class="check-icon empty">3</div>
                <div class="check-text">
                    <div class="check-title">퍼포먼스 광고</div>
                    <div class="check-desc">메타 · 구글 · 네이버 검색광고</div>
                </div>
                <div class="check-badge gray">선택</div>
            </div>
            <div class="check-item">
                <div class="check-icon empty">4</div>
                <div class="check-text">
                    <div class="check-title">유통 채널 입점</div>
                    <div class="check-desc">올리브영 · 쿠팡 · 네이버 스마트스토어</div>
                </div>
                <div class="check-badge gray">선택</div>
            </div>
        </div>

        <div class="bottom-msg">
            <strong>brandrise</strong>가 우선순위를 잡아드립니다
        </div>
    </div>

    <div class="cta-bar">마케팅 예산 무료 진단받기 →</div>
</div>
</body>
</html>
