<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Pretendard', sans-serif;
    background: linear-gradient(180deg, #0F172A 0%, #070B14 100%);
    color: #FFFFFF;
}
.slide { width: 1080px; height: 1080px; position: relative; }

.logo {
    position: absolute; top: 40px; right: 48px;
    font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 1px;
}

.content {
    padding: 72px 64px; padding-bottom: 120px;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%;
}

.tag {
    display: inline-block;
    font-size: 20px; font-weight: 600;
    color: #60A5FA; background: rgba(96,165,250,0.12);
    padding: 8px 20px; border-radius: 100px;
    margin-bottom: 28px; width: fit-content;
}

.hook {
    font-size: 28px; font-weight: 400; color: #94A3B8;
    line-height: 1.5; margin-bottom: 20px;
}

.headline {
    font-size: 54px; font-weight: 800; line-height: 1.3;
    letter-spacing: -1.5px; margin-bottom: 40px;
}

.number-before { color: #6B7280; }
.arrow { color: #94A3B8; margin: 0 12px; }
.number-after { color: #FFD54F; }

/* Before / After 박스 */
.ba-row {
    display: flex; gap: 24px; margin-bottom: 40px;
}
.ba-box {
    flex: 1; border-radius: 16px; padding: 32px;
    text-align: center;
}
.ba-box.before {
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
}
.ba-box.after {
    background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2);
}
.ba-label {
    font-size: 18px; font-weight: 600; margin-bottom: 12px;
    letter-spacing: 2px;
}
.ba-label.red { color: #F87171; }
.ba-label.green { color: #4ADE80; }

.ba-value {
    font-size: 40px; font-weight: 800;
}
.ba-box.before .ba-value { color: #9CA3AF; }
.ba-box.after .ba-value { color: #FFFFFF; }

.ba-desc {
    font-size: 16px; color: #94A3B8; margin-top: 8px;
}

/* 사례 설명 */
.case-info {
    font-size: 22px; color: #94A3B8; line-height: 1.6;
}
.case-info strong { color: #E2E8F0; font-weight: 600; }
.case-info .metric { color: #FFD54F; font-weight: 700; }

/* CTA 바 */
.cta-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 88px; background: #2563EB;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; color: #FFFFFF;
}
</style>
</head>
<body>
<div class="slide">
    <div class="logo">brandrise</div>
    <div class="content">
        <div class="tag">브랜드 디자인 / 리뉴얼</div>
        <div class="hook">브랜드가 오래됐다면?</div>
        <div class="headline">
            리뉴얼 하나로<br>
            매출 <span class="number-before">445억</span>
            <span class="arrow">→</span>
            <span class="number-after">775억</span>
        </div>

        <div class="ba-row">
            <div class="ba-box before">
                <div class="ba-label red">BEFORE</div>
                <div class="ba-value">445억</div>
                <div class="ba-desc">노후화된 브랜드</div>
            </div>
            <div class="ba-box after">
                <div class="ba-label green">AFTER</div>
                <div class="ba-value">775억</div>
                <div class="ba-desc">시장점유율 40.8%</div>
            </div>
        </div>

        <div class="case-info">
            <strong>CJ 맥스봉</strong> — 캐릭터 리뉴얼 + 제품 개발 + 마케팅 설계<br>
            <span class="metric">74.2% 매출 성장</span> 달성
        </div>
    </div>
    <div class="cta-bar">우리 브랜드 무료 진단받기 →</div>
</div>
</body>
</html>
