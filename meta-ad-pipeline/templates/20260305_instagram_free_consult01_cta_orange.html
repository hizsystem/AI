<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: #D4CBC2;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .slide {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      background: #F5F0EB;
    }
    .slide-inner {
      padding: 56px 60px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .page-num {
      font-size: 26px; font-weight: 500;
      color: #9E9E9E;
      position: absolute; top: 56px; right: 60px;
    }
    .credit {
      position: absolute; bottom: 56px;
      left: 0; right: 0; text-align: center;
      font-size: 24px; font-weight: 400;
      color: #9E9E9E;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="slide-inner">
      <div class="page-num">07 / 07</div>

      <div style="width:96px; height:96px; background:#E8752E; border-radius:24px; display:flex; align-items:center; justify-content:center; margin-bottom:36px;">
        <span style="font-size:48px; color:#FFFFFF; font-weight:900;">B</span>
      </div>

      <div style="font-size:72px; font-weight:900; line-height:1.25; letter-spacing:-2px; color:#1A1A1A; margin-bottom:24px;">
        무료 마케팅 진단<br>
        <span style="color:#E8752E;">지금 신청하세요</span>
      </div>

      <div style="font-size:36px; font-weight:400; line-height:1.6; color:#3D3D3D; margin-bottom:48px;">
        5개 질문에 답하면<br>
        맞춤 진단 리포트를 보내드립니다.
      </div>

      <div style="display:inline-block; background:#E8752E; color:#FFFFFF; padding:28px 64px; border-radius:16px; font-size:36px; font-weight:700;">
        무료 진단 신청하기
      </div>

      <div style="margin-top:28px; font-size:30px; font-weight:400; color:#9E9E9E;">
        start.brandrise.co.kr
      </div>

      <div class="credit">brandrise</div>
    </div>
  </div>
</body>
</html>
