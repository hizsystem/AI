name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
    paths: ['ecommerce-lecture/**', 'docs/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - name: Combine deploy sources
        run: |
          mkdir -p _site
          cp -r ecommerce-lecture/* _site/
          cp -r docs/* _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
